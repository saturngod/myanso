name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS (arm64)
            runner: macos-14
            args: --mac --arm64
            artifact: myanso-macos-arm64
          - name: Linux x64 (AppImage/deb/rpm)
            runner: ubuntu-latest
            args: --linux AppImage deb rpm --x64
            artifact: myanso-linux-x64
          - name: Linux arm64 (AppImage/deb/rpm)
            runner: ubuntu-24.04-arm
            args: --linux AppImage deb rpm --arm64
            artifact: myanso-linux-arm64
          - name: Windows (NSIS)
            runner: windows-latest
            args: --win nsis
            artifact: myanso-windows-nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python (node-gyp)
        if: matrix.platform.runner != 'macos-14'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux build deps
        if: startsWith(matrix.platform.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential rpm fakeroot

      - name: Install dependencies
        run: npm ci

      - name: Build Electron bundles
        run: npm run build

      - name: Package with electron-builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINUX_MAINTAINER: ${{ secrets.LINUX_MAINTAINER }}
        run: npx electron-builder ${{ matrix.platform.args }} -c.linux.maintainer="$LINUX_MAINTAINER" --publish never
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact }}
          path: |
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: ignore

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Myanso ${{ github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: artifacts/**/*
          token: ${{ secrets.GITHUB_TOKEN }}

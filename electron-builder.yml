appId: app.myanmars.myanso
productName: Myanso
copyright: Copyright © 2025 COMQUAS

directories:
  output: dist
  buildResources: build

# App source + native deps; exclude dev cache
files:
  - main.js
  - renderer.js
  - index.html
  - patches/**/*
  - node_modules/**/*
  - icon.png
  - "!node_modules/.cache"
  - "!node_modules/.bin"

mac:
  category: public.app-category.developer-tools
  icon: icon.png
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  # Lets users drag a folder onto the dock icon — macOS only forwards the
  # drop (open-file) when CFBundleDocumentTypes declares the type.
  extendInfo:
    CFBundleDocumentTypes:
      - CFBundleTypeName: Folder
        CFBundleTypeRole: Viewer
        LSItemContentTypes:
          - public.folder
        LSHandlerRank: Alternate
  target:
    - target: dmg
      arch:
        - arm64

dmg:
  title: Myanso ${version}

win:
  # Multi-size ICO (16…256px) built from build/icons/ via ImageMagick for a
  # crisp taskbar/installer icon. Regenerate with:
  #   magick build/icons/16x16.png build/icons/32x32.png build/icons/48x48.png \
  #     build/icons/64x64.png build/icons/128x128.png build/icons/256x256.png build/icon.ico
  icon: build/icon.ico
  target: nsis

linux:
  # A directory of sized PNGs (16x16…1024x1024) so the deb/rpm install
  # hicolor icons the desktop menu can find. A single PNG often leaves
  # the .deb with no menu icon.
  icon: build/icons
  category: Development
  synopsis: Myanmar-aware terminal emulator
  description: Desktop terminal emulator with first-class support for Myanmar (Burmese) Unicode text rendering, tabs, and split panes.
  target:
    - AppImage
    - deb
    - rpm

deb:
  # Ubuntu 24.04 / Debian trixie renamed some libs for the 64-bit time_t
  # transition (libgtk-3-0 -> libgtk-3-0t64, libatspi2.0-0 -> ...t64).
  # Use "old | new" alternatives so the deb installs on both old and new.
  depends:
    - libgtk-3-0 | libgtk-3-0t64
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0 | libatspi2.0-0t64
    - libsecret-1-0

rpm:
  depends:
    - gtk3
    - libnotify
    - nss
    - libXScrnSaver
    - libXtst
    - xdg-utils
    - at-spi2-core
    - libsecret

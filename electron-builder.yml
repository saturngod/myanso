appId: app.myanmars.myanso
productName: Myanso
copyright: Copyright © 2025 COMQUAS

directories:
  output: dist
  buildResources: build

# App source + native deps; exclude dev cache
files:
  - main.js
  - renderer.js
  - index.html
  - patches/**/*
  - node_modules/**/*
  - icon.png
  - "!node_modules/.cache"
  - "!node_modules/.bin"

mac:
  category: public.app-category.developer-tools
  icon: icon.png
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  # Lets users drag a folder onto the dock icon — macOS only forwards the
  # drop (open-file) when CFBundleDocumentTypes declares the type.
  extendInfo:
    CFBundleDocumentTypes:
      - CFBundleTypeName: Folder
        CFBundleTypeRole: Viewer
        LSItemContentTypes:
          - public.folder
        LSHandlerRank: Alternate
  target:
    - target: dmg
      arch:
        - arm64

dmg:
  title: Myanso ${version}

win:
  # PNG works (electron-builder converts on the fly) but produces a fuzzy
  # icon. For a crisp taskbar/installer icon, generate a multi-size ICO
  # at build/icon.ico and change this path to "build/icon.ico".
  icon: icon.png
  target: nsis

linux:
  # A directory of sized PNGs (16x16…1024x1024) so the deb/rpm install
  # hicolor icons the desktop menu can find. A single PNG often leaves
  # the .deb with no menu icon.
  icon: build/icons
  category: Development
  synopsis: Myanmar-aware terminal emulator
  description: Desktop terminal emulator with first-class support for Myanmar (Burmese) Unicode text rendering, tabs, and split panes.
  target:
    - AppImage
    - deb
    - rpm

deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libsecret-1-0

rpm:
  depends:
    - gtk3
    - libnotify
    - nss
    - libXScrnSaver
    - libXtst
    - xdg-utils
    - at-spi2-core
    - libsecret
